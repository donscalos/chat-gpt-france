name: Generate SEO Article

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8am UTC
    - cron: '0 8 * * 4'  # Thursday 8am UTC
  workflow_dispatch:      # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pick next keyword
        id: keyword
        run: |
          # Find keywords that don't have a folder yet
          PENDING=""
          while IFS= read -r kw; do
            [[ -z "$kw" ]] && continue
            if [ ! -d "$kw" ]; then
              PENDING="$kw"
              break
            fi
          done < _seo/keywords.txt
          if [ -z "$PENDING" ]; then
            echo "All keywords done."
            echo "slug=" >> $GITHUB_OUTPUT
          else
            echo "slug=$PENDING" >> $GITHUB_OUTPUT
          fi

      - name: Generate article with Claude
        if: steps.keyword.outputs.slug != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLUG: ${{ steps.keyword.outputs.slug }}
        run: |
          python3 - <<'PYEOF'
          import os, json, re, pathlib, urllib.request

          slug = os.environ["SLUG"]
          # Convert slug to readable title
          title_raw = slug.replace("-", " ").title()

          prompt = f"""Tu es un expert SEO français. Génère une page HTML complète et autonome pour le mot-clé "{title_raw}" sur le site chat-gpt-france.fr.

          CONTRAINTES STRICTES :
          - Retourne UNIQUEMENT le HTML complet, rien d'autre, pas de markdown, pas de balises code
          - Commence par <!DOCTYPE html> et termine par </html>
          - Utilise exactement ce CSS externe : <link rel="stylesheet" href="../css/style.css">
          - Structure de navigation identique aux autres pages du site :
            <header><div class="header-inner"><a href="/" class="logo">ChatGPT France</a><nav><a href="/">Accueil</a><a href="/gratuit/">Gratuit</a><a href="/sans-inscription/">Sans compte</a><a href="/alternatives-chatgpt/">Alternatives</a><a href="/utiliser-chatgpt/">Tutoriel</a></nav></div></header>
          - Footer identique : © 2025 chat-gpt-france.fr — Guide indépendant, non affilié à OpenAI
          - Lang="fr", canonical="https://chat-gpt-france.fr/{slug}/"
          - Title SEO optimisé (60 chars max), meta description (155 chars max)
          - Contenu : minimum 800 mots, H2/H3, listes, tableaux si pertinent
          - Classes CSS disponibles : .hero, .hero-inner, .badge, .btn.btn-primary, .btn.btn-outline, .card-grid, .card, .highlight, .list-check, .steps, .faq, .faq-item, .compare-table, .affiliate-box, .affiliate-box.green, .toc, .breadcrumb, .section-eyebrow, .decorated, .ad-slot
          - Intègre 2-3 liens internes vers /gratuit/, /alternatives-chatgpt/, /utiliser-chatgpt/
          - Ajoute schema JSON-LD Article ou FAQPage selon le contenu
          - Insère 2 blocs <div class="ad-slot"><!-- AdSense --></div> (milieu + bas)
          - Ton : expert mais accessible, en français courant
          - Le contenu doit être utile, original et répondre à l'intention de recherche du mot-clé

          Mot-clé principal : {title_raw}
          URL de la page : https://chat-gpt-france.fr/{slug}/
          """

          payload = json.dumps({
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 4096,
            "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
            "https://api.anthropic.com/v1/messages",
            data=payload,
            headers={
              "x-api-key": os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
            }
          )
          with urllib.request.urlopen(req) as resp:
            data = json.loads(resp.read())

          html = data["content"][0]["text"].strip()

          # Strip accidental markdown fences if Claude adds them
          html = re.sub(r'^```html\s*', '', html)
          html = re.sub(r'^```\s*', '', html)
          html = re.sub(r'\s*```$', '', html)

          # Inject Impact/Semrush affiliate tracking script
          impact_script = '  <script type="text/javascript">(function(i,m,p,a,c,t){c.ire_o=p;c[p]=c[p]||function(){(c[p].a=c[p].a||[]).push(arguments)};t=a.createElement(m);var z=a.getElementsByTagName(m)[0];t.async=1;t.src=i;z.parentNode.insertBefore(t,z)})(\'https://utt.impactcdn.com/P-A7247698-8f5c-49ef-9fcd-678ec97f37f81.js\',\'script\',\'impactStat\',document,window);impactStat(\'transformLinks\');impactStat(\'trackImpression\');</script>'
          if 'impactcdn.com' not in html:
            html = html.replace('</head>', impact_script + '\n</head>')

          out = pathlib.Path(slug)
          out.mkdir(exist_ok=True)
          (out / "index.html").write_text(html, encoding="utf-8")
          print(f"Article written to {slug}/index.html ({len(html)} chars)")
          PYEOF

      - name: Regenerate blog index
        if: steps.keyword.outputs.slug != ''
        run: |
          python3 - <<'PYEOF'
          import pathlib, re, hashlib

          SKIP = {'blog', 'css', 'gratuit', 'sans-inscription', 'alternatives-chatgpt', 'utiliser-chatgpt', '_seo', '.github'}

          # Pexels photo pool — AI/tech themed images (free to use)
          PEXELS_POOL = [
            '8386440', '8849295', '8566526', '8386437', '8294619',
            '8294566', '18799044', '8294654', '8294663', '7688592',
            '8386359', '5181148', '4604607', '8566464', '8386369', '8566470',
            '8386441', '8849299', '8566527', '3861969', '3861958',
            '5473955', '4050291', '4050287', '5380642', '5380651',
          ]

          def pexels_url(slug, w=600, h=360):
            # deterministic pick based on slug so it never changes on re-run
            idx = int(hashlib.md5(slug.encode()).hexdigest(), 16) % len(PEXELS_POOL)
            pid = PEXELS_POOL[idx]
            return f'https://images.pexels.com/photos/{pid}/pexels-photo-{pid}.jpeg?auto=compress&cs=tinysrgb&w={w}&h={h}&fit=crop'

          articles = []
          for d in sorted(pathlib.Path('.').iterdir()):
            if d.is_dir() and d.name not in SKIP and not d.name.startswith('.'):
              html = d / 'index.html'
              if html.exists():
                content = html.read_text(encoding='utf-8')
                title = re.search(r'<title>(.*?)</title>', content)
                desc  = re.search(r'<meta name="description" content="(.*?)"', content)
                articles.append({
                  'slug':  d.name,
                  'title': title.group(1) if title else d.name.replace('-', ' ').title(),
                  'desc':  desc.group(1)  if desc  else '',
                })

          cards = ''
          for a in articles:
            img_url = pexels_url(a['slug'])
            img_alt = a['title'].replace('"', '').strip()
            cards += f'''    <a href="/{a['slug']}/" class="card card-link">
              <div class="card-thumb"><img src="{img_url}" alt="{img_alt}" loading="lazy"></div>
              <div class="card-body">
                <h3>{a['title']}</h3>
                <p>{a['desc']}</p>
              </div>
            </a>\n'''

          blog = pathlib.Path('blog/index.html')
          src = blog.read_text(encoding='utf-8')
          src = re.sub(r'<!-- ARTICLES_START -->.*?<!-- ARTICLES_END -->',
                       f'<!-- ARTICLES_START -->\n{cards}    <!-- ARTICLES_END -->',
                       src, flags=re.DOTALL)
          blog.write_text(src, encoding='utf-8')
          print(f"Blog index updated with {len(articles)} articles")
          PYEOF

      - name: Commit and push
        if: steps.keyword.outputs.slug != ''
        env:
          SLUG: ${{ steps.keyword.outputs.slug }}
        run: |
          git config user.name "SEO Bot"
          git config user.email "seobot@chat-gpt-france.fr"
          git add "$SLUG/" blog/index.html
          git commit -m "SEO: add article $SLUG + update blog index"
          git push

      - name: Deploy to Cloudflare Pages
        if: steps.keyword.outputs.slug != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy . --project-name=chat-gpt-france --branch=main
