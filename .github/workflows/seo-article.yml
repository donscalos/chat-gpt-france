name: Generate SEO Article

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8am UTC
  workflow_dispatch:      # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pick next keyword
        id: keyword
        run: |
          # Find keywords that don't have a folder yet
          PENDING=""
          while IFS= read -r kw; do
            [[ -z "$kw" ]] && continue
            if [ ! -d "$kw" ]; then
              PENDING="$kw"
              break
            fi
          done < _seo/keywords.txt
          if [ -z "$PENDING" ]; then
            echo "All keywords done."
            echo "slug=" >> $GITHUB_OUTPUT
          else
            echo "slug=$PENDING" >> $GITHUB_OUTPUT
          fi

      - name: Generate article with Claude
        if: steps.keyword.outputs.slug != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLUG: ${{ steps.keyword.outputs.slug }}
        run: |
          python3 - <<'PYEOF'
          import os, json, re, pathlib, urllib.request, hashlib

          slug = os.environ["SLUG"]
          title_raw = slug.replace("-", " ").title()

          # Pool Pexels — thème IA / tech / néon / futuriste (vérifié valide)
          PEXELS_POOL = [
            '8386440', '4144923', '3861969', '8438923', '5473955',
            '3861943', '8438918', '6153354', '3184298', '4508751',
            '373543', '2599244', '8439065', '8386365', '8438961',
            '373076', '6153738', '1181671', '574077', '220357',
            '546819', '355948', '907485', '442151', '132700',
            '315938', '1114690', '1181244', '8386421', '7241428',
            '6153556', '8386368', '8438969', '5473957', '8438932',
            '3184338', '8386751', '1181677', '6963622',
          ]

          def pick_imgs(s, n=3):
              h = int(hashlib.md5(s.encode()).hexdigest(), 16)
              idxs, i = [], 0
              while len(idxs) < n:
                  idx = (h + i * 7) % len(PEXELS_POOL)
                  if idx not in idxs:
                      idxs.append(idx)
                  i += 1
              return [PEXELS_POOL[k] for k in idxs]

          def pexels(pid, w):
              return f"https://images.pexels.com/photos/{pid}/pexels-photo-{pid}.jpeg?auto=compress&cs=tinysrgb&w={w}"

          _imgs = pick_imgs(slug)
          hero_img = pexels(_imgs[0], 1600)
          fig1_img = pexels(_imgs[1], 1200)
          fig2_img = pexels(_imgs[2], 1200)

          prompt = f"""Tu es un expert SEO français. Génère une page HTML complète et autonome pour le mot-clé "{title_raw}" sur le site chat-gpt-france.fr.

          CONTRAINTES STRICTES :
          - Retourne UNIQUEMENT le HTML complet, rien d'autre, pas de markdown, pas de balises code
          - Commence par <!DOCTYPE html> et termine par </html>
          - Inclure ce snippet Google Analytics dans le <head> : <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=G-8GW0F66VS5"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments);}}gtag('js',new Date());gtag('config','G-8GW0F66VS5');</script>
          - Utilise exactement ce CSS externe : <link rel="stylesheet" href="../css/style.css">
          - Structure de navigation identique aux autres pages du site :
            <header><div class="header-inner"><a href="/" class="logo">ChatGPT France</a><nav><a href="/">Accueil</a><a href="/gratuit/">Gratuit</a><a href="/sans-inscription/">Sans compte</a><a href="/alternatives-chatgpt/">Alternatives</a><a href="/blog/">Blog</a><a href="/a-propos/">À propos</a></nav></div></header>
          - Footer identique : © 2025 chat-gpt-france.fr — Guide indépendant, non affilié à OpenAI
          - Lang="fr", canonical="https://chat-gpt-france.fr/{slug}/"
          - Title SEO optimisé (60 chars max), meta description (155 chars max)

          - HERO AVEC IMAGE (structure EXACTE, garde __HERO_IMG__ tel quel, un script le remplacera) :
            <div class="hero hero-photo" style="background-image:url('__HERO_IMG__')"><div class="hero-grid"></div><div class="hero-inner"><div class="badge">Guide IA</div><h1>LE TITRE H1 ACCROCHEUR</h1><p>UNE PHRASE D'ACCROCHE COURTE ET INCISIVE</p></div></div>

          - INSERE EXACTEMENT 2 figures dans le corps, à des endroits naturels (garde __FIG1__ et __FIG2__ tels quels) :
            <figure class="article-figure"><img src="__FIG1__" alt="DESCRIPTION SEO INCLUANT LE MOT-CLE" width="1200" height="800" loading="lazy"><figcaption>Légende contextuelle courte</figcaption></figure>
            puis, plus loin dans l'article, la meme chose avec __FIG2__.
            REGLES ALT SEO : chaque alt doit contenir "{title_raw}" ou une variante, décrire l'image de manière naturelle (ex. "Interface ChatGPT sur écran d'ordinateur", "Illustration futuriste de l'intelligence artificielle"), 8-15 mots, sans bourrage de mots-clés. Les légendes doivent rester atmosphériques et générales.

          - Contenu : minimum 900 mots, H2/H3, listes, tableaux si pertinent
          - Classes CSS disponibles : .hero, .hero-photo, .hero-inner, .hero-grid, .badge, .btn.btn-primary, .btn.btn-outline, .card-grid, .card, .highlight, .list-check, .steps, .faq, .faq-item, .compare-table, .toc, .breadcrumb, .section-eyebrow, .decorated, .article-figure
          - Intègre 2-3 liens internes vers /gratuit/, /alternatives-chatgpt/, /utiliser-chatgpt/, /a-propos/
          - Ajoute un schema JSON-LD de type Article avec : headline, description, datePublished, dateModified, "author" valant OBLIGATOIREMENT {{"@type":"Person","name":"Alexandre Meynier","url":"https://chat-gpt-france.fr/a-propos/"}}, "publisher" valant {{"@type":"Organization","name":"ChatGPT France","url":"https://chat-gpt-france.fr/"}}
          - Après le H1 dans le hero, ajoute une byline : <div class="byline"><span>Par <a href="/a-propos/" class="byline-author">Alexandre Meynier</a></span></div>
          - N'ajoute AUCUN bloc de publicité, AUCUN bloc d'affiliation (pas de ad-slot)
          - Ton : expert mais accessible, en français courant
          - Le contenu doit être utile, original et répondre à l'intention de recherche du mot-clé

          Mot-clé principal : {title_raw}
          URL de la page : https://chat-gpt-france.fr/{slug}/
          """

          payload = json.dumps({
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 8000,
            "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
            "https://api.anthropic.com/v1/messages",
            data=payload,
            headers={
              "x-api-key": os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
            }
          )
          try:
            with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
            body = e.read().decode('utf-8', errors='replace')
            print(f"[Anthropic API error] status={e.code} body={body}")
            raise

          html = data["content"][0]["text"].strip()

          # Strip accidental markdown fences if Claude adds them
          html = re.sub(r'^```html\s*', '', html)
          html = re.sub(r'^```\s*', '', html)
          html = re.sub(r'\s*```$', '', html)

          # Inject Pexels images into placeholders
          html = html.replace("__HERO_IMG__", hero_img)
          html = html.replace("__FIG1__", fig1_img)
          html = html.replace("__FIG2__", fig2_img)

          out = pathlib.Path(slug)
          out.mkdir(exist_ok=True)
          (out / "index.html").write_text(html, encoding="utf-8")
          print(f"Article written to {slug}/index.html ({len(html)} chars)")
          PYEOF

      - name: Regenerate blog index
        if: steps.keyword.outputs.slug != ''
        run: |
          python3 - <<'PYEOF'
          import pathlib, re, hashlib

          SKIP = {'blog', 'css', 'gratuit', 'sans-inscription', 'alternatives-chatgpt', 'utiliser-chatgpt', 'a-propos', '_seo', '.github'}

          # Pexels photo pool — thème IA / tech / néon / futuriste (vérifié)
          PEXELS_POOL = [
            '8386440', '4144923', '3861969', '8438923', '5473955',
            '3861943', '8438918', '6153354', '3184298', '4508751',
            '373543', '2599244', '8439065', '8386365', '8438961',
            '373076', '6153738', '1181671', '574077', '220357',
            '546819', '355948', '907485', '442151', '132700',
            '315938', '1114690', '1181244', '8386421', '7241428',
            '6153556', '8386368', '8438969', '5473957', '8438932',
            '3184338', '8386751', '1181677', '6963622',
          ]

          def pexels_url(slug, w=600, h=360):
            # deterministic pick based on slug so it never changes on re-run
            idx = int(hashlib.md5(slug.encode()).hexdigest(), 16) % len(PEXELS_POOL)
            pid = PEXELS_POOL[idx]
            return f'https://images.pexels.com/photos/{pid}/pexels-photo-{pid}.jpeg?auto=compress&cs=tinysrgb&w={w}&h={h}&fit=crop'

          articles = []
          for d in sorted(pathlib.Path('.').iterdir()):
            if d.is_dir() and d.name not in SKIP and not d.name.startswith('.'):
              html = d / 'index.html'
              if html.exists():
                content = html.read_text(encoding='utf-8')
                title = re.search(r'<title>(.*?)</title>', content)
                desc  = re.search(r'<meta name="description" content="(.*?)"', content)
                articles.append({
                  'slug':  d.name,
                  'title': title.group(1) if title else d.name.replace('-', ' ').title(),
                  'desc':  desc.group(1)  if desc  else '',
                })

          cards = ''
          for a in articles:
            img_url = pexels_url(a['slug'])
            img_alt = a['title'].replace('"', '').strip()
            cards += f'''    <a href="/{a['slug']}/" class="card card-link">
              <div class="card-thumb"><img src="{img_url}" alt="{img_alt}" loading="lazy"></div>
              <div class="card-body">
                <h3>{a['title']}</h3>
                <p>{a['desc']}</p>
              </div>
            </a>\n'''

          blog = pathlib.Path('blog/index.html')
          src = blog.read_text(encoding='utf-8')
          src = re.sub(r'<!-- ARTICLES_START -->.*?<!-- ARTICLES_END -->',
                       f'<!-- ARTICLES_START -->\n{cards}    <!-- ARTICLES_END -->',
                       src, flags=re.DOTALL)
          blog.write_text(src, encoding='utf-8')
          print(f"Blog index updated with {len(articles)} articles")
          PYEOF

      - name: Regenerate sitemap
        if: steps.keyword.outputs.slug != ''
        run: |
          python3 - <<'PYEOF'
          import pathlib, re
          from datetime import date

          SKIP = {'blog', 'css', 'gratuit', 'sans-inscription', 'alternatives-chatgpt', 'utiliser-chatgpt', 'a-propos', '_seo', '.github'}
          STATIC_PAGES = [
            ('https://chat-gpt-france.fr/', '1.0', 'weekly'),
            ('https://chat-gpt-france.fr/gratuit/', '0.9', 'monthly'),
            ('https://chat-gpt-france.fr/sans-inscription/', '0.9', 'monthly'),
            ('https://chat-gpt-france.fr/alternatives-chatgpt/', '0.9', 'monthly'),
            ('https://chat-gpt-france.fr/utiliser-chatgpt/', '0.8', 'monthly'),
            ('https://chat-gpt-france.fr/blog/', '0.8', 'weekly'),
            ('https://chat-gpt-france.fr/a-propos/', '0.7', 'monthly'),
          ]

          today = date.today().isoformat()
          urls = ''

          # Static pages
          for loc, priority, freq in STATIC_PAGES:
            urls += f'  <url>\n    <loc>{loc}</loc>\n    <lastmod>{today}</lastmod>\n    <changefreq>{freq}</changefreq>\n    <priority>{priority}</priority>\n  </url>\n'

          # Article pages
          for d in sorted(pathlib.Path('.').iterdir()):
            if d.is_dir() and d.name not in SKIP and not d.name.startswith('.'):
              html_file = d / 'index.html'
              if html_file.exists():
                mtime = date.fromtimestamp(html_file.stat().st_mtime).isoformat()
                urls += f'  <url>\n    <loc>https://chat-gpt-france.fr/{d.name}/</loc>\n    <lastmod>{mtime}</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n'

          sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' + urls + '</urlset>\n'

          pathlib.Path('sitemap.xml').write_text(sitemap, encoding='utf-8')
          print(f"Sitemap regenerated with {urls.count('<url>')} URLs")
          PYEOF

      - name: Commit and push
        if: steps.keyword.outputs.slug != ''
        env:
          SLUG: ${{ steps.keyword.outputs.slug }}
        run: |
          git config user.name "SEO Bot"
          git config user.email "seobot@chat-gpt-france.fr"
          git add "$SLUG/" blog/index.html sitemap.xml
          git commit -m "SEO: add article $SLUG + update blog index + sitemap"
          git push

      - name: Deploy to Cloudflare Pages
        if: steps.keyword.outputs.slug != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy . --project-name=chat-gpt-france --branch=main
